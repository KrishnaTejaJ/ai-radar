name: AI Radar Update

on:
  schedule:
    # 3 runs per day in UTC: 07:00, 13:00, 19:00
    # Adjust to your local timezone preferences if needed
    - cron: '0 7 * * *'
    - cron: '0 13 * * *'
    - cron: '0 19 * * *'
  workflow_dispatch:  # manual trigger from Actions tab

permissions:
  contents: write  # needed to commit data.json + seen.json back

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install feedparser requests groq

      - name: Run update
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          AA_API_KEY: ${{ secrets.AA_API_KEY }}
        run: python update.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data.json seen.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: radar update $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push
          fi